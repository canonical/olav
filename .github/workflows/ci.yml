name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - run: go mod download
      - run: go test ./...
      - run: go build ./cmd/olav
