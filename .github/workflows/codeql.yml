name: CodeQL

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '23 2 * * *'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - run: go mod download
      - uses: github/codeql-action/analyze@v4
