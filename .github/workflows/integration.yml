name: Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  image-sources:
    runs-on: ubuntu-latest
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      TEST_IMAGE: busybox:1.36
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - run: go build -o ./olav ./cmd/olav
      - name: Resolve docker registry image
        run: ./olav --resolve-only "docker://${TEST_IMAGE}"
      - name: Resolve docker daemon image
        run: |
          docker pull "${TEST_IMAGE}"
          ./olav --resolve-only "docker-daemon:${TEST_IMAGE}"
      - name: Resolve docker daemon RepoDigest image
        run: |
          DIGEST="$(docker image inspect "${TEST_IMAGE}" --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{end}}')"
          if [ -z "$DIGEST" ]; then
            echo "busybox image has no RepoDigests; skipping digest-based daemon check"
            exit 0
          fi
          ./olav --resolve-only "docker-daemon:${DIGEST}"
